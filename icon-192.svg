<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1F1F1F"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" fill="url(#bg)"/>
  <!-- Ascending bars: rank-up metaphor, asymmetric (not generic chart) -->
  <g transform="translate(96 116)">
    <!-- bar 1 (lowest, behind) -->
    <rect x="-46" y="-16" width="22" height="44" fill="#FFFFFF" opacity="0.35" rx="3"/>
    <!-- bar 2 (mid) -->
    <rect x="-12" y="-32" width="22" height="60" fill="#FFFFFF" opacity="0.6" rx="3"/>
    <!-- bar 3 (top, lead — accent) -->
    <rect x="22" y="-52" width="22" height="80" fill="#3B82F6" rx="3"/>
    <!-- crown dot on top of leading bar -->
    <circle cx="33" cy="-60" r="5" fill="#3B82F6"/>
  </g>
</svg>
